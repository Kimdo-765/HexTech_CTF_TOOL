name: hextech_ctf_tool

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "${WEB_PORT:-8000}:8000"
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      # Lift the SDK's per-turn output cap. The model still has its
      # own hard ceiling (Sonnet/Opus ~64k), so the agent picks
      # whatever its model supports rather than getting truncated
      # at the SDK default. Override in .env if you want it lower.
      CLAUDE_CODE_MAX_OUTPUT_TOKENS: ${CLAUDE_CODE_MAX_OUTPUT_TOKENS:-999999}
      # SDK 0.2.x connects MCP servers in the background by default (slow ones
      # report status=pending until ready). Our in-process `team` spawn_subagent
      # server must be live before turn 1, so restore the pre-0.2.82 synchronous
      # connect. memory: sdk_bundled_cli_thinking_400.
      MCP_CONNECTION_NONBLOCKING: "0"
    volumes:
      - ./data:/data
      - ./modules:/app/modules:ro
      - ./web-ui:/app/web-ui:ro
      # Mount the api source so code changes (especially api/routes/*) take
      # effect on `docker compose restart api` without rebuilding the image.
      # Worker already mounts ./modules the same way. Concrete incident
      # 2026-05-17: `_carry_work_ignore` patch in api/routes/retry.py did
      # NOT propagate because api was image-baked; retries that copied a
      # rootfs (with dev/console chr device) hung copytree indefinitely.
      - ./api:/app/api:ro
      # rw (not ro) so /retry and /resume can copy the previous SDK
      # session's transcript jsonl into the new job's project-key
      # directory under ~/.claude/projects/. Without this the SDK
      # CLI transport searches only the new cwd's project key and
      # can't find the prior session, so fork_session silently fails.
      - ${HOST_CLAUDE_HOME:-${HOME}/.claude}:/root/.claude
      # api needs the docker socket to kill sibling containers spawned by
      # workers when the user deletes a running job.
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    # No cgroup memory cap. Earlier images set mem_limit/memswap_limit
    # under the assumption that long heap-pwn runs were dying from
    # cumulative-heap OOM-killer hits. Forensic investigation in May
    # 2026 showed every "exit code -9" from those runs was actually
    # the debugger subagent self-pkilling via `pkill -f "./prob"` —
    # the SDK passes system_prompt as a CLI argv, so the regex matched
    # the agent's own claude CLI process. The fratricide is fixed in
    # the prompt (pkill -x comm-anchored matching); no cgroup cap is
    # required to defend against a phantom failure mode.
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      HOST_DATA_DIR: ${HOST_DATA_DIR:-./data}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-3}
      # Tell the bundled `claude` CLI it is running in a sandbox so it allows
      # --dangerously-skip-permissions even though the container runs as root.
      IS_SANDBOX: "1"
      # Lift the SDK's per-turn output cap. The model's own ceiling
      # (Sonnet/Opus ~64k) becomes the effective limit. Override in
      # .env to throttle if needed.
      CLAUDE_CODE_MAX_OUTPUT_TOKENS: ${CLAUDE_CODE_MAX_OUTPUT_TOKENS:-999999}
      # Restore pre-0.2.82 synchronous MCP connect so the in-process `team`
      # spawn_subagent server is ready before main's turn 1 (SDK 0.2.x defaults
      # to background connect). memory: sdk_bundled_cli_thinking_400.
      MCP_CONNECTION_NONBLOCKING: "0"
      # Trip-wire: at this many tool calls without an artifact, the
      # orchestrator FALLS BACK to a probe-only skeleton at exploit.py
      # so the sandbox + postjudge path still runs (job ends as
      # no_flag/partial instead of failed). Default raised 100 → 150
      # after jobs d8de/0bb1/13a3 hit budget cleanly but never produced
      # an artifact even after FINAL_DRAFT push; the higher cap gives
      # Sonnet-4.6 enough rope to land a real draft while the fallback
      # path guarantees the run never aborts. A soft eject + scaffold
      # nudge fire well before the cap; the fallback is the safety net.
      INVESTIGATION_BUDGET: ${INVESTIGATION_BUDGET:-150}
      # Max postjudge-driven auto retries within a single job (in
      # addition to the first attempt). When auto_run is on and the
      # sandbox returns a non-success verdict with an actionable
      # retry_hint, the orchestrator injects that hint as a new user
      # turn back to the same main SDK session, preserving cache.
      # Semantics:
      #   0                    → disabled (legacy fire-and-forget)
      #   N (positive int)     → cap at exactly N retries
      #   -1 / inf / unlimited → no cap; loop continues until success,
      #     empty retry_hint, agent error, BUDGET_ABORT, user Stop, or
      #     soft/hard timeout
      # Default: -1 (unlimited). Override via .env if you want a cap.
      AUTO_RETRY_MAX: ${AUTO_RETRY_MAX:--1}
    volumes:
      - ./data:/data
      - ./modules:/app/modules:ro
      # Mount the worker source so changes to worker/runner.py
      # (e.g. _sweep_stale_tmp, RQ wiring) take effect on `restart
      # worker` without rebuilding. Same rationale as api's
      # ./api:/app/api:ro mount.
      - ./worker:/app/worker:ro
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount the host's Claude Code config so the bundled `claude` CLI in the
      # worker uses your existing claude.ai OAuth token (no API key needed).
      # Run `claude login` once on the host to populate ~/.claude/.
      - ${HOST_CLAUDE_HOME:-${HOME}/.claude}:/root/.claude
    depends_on:
      - redis
    restart: unless-stopped

  # Built but not started by default. Worker spawns transient instances per job.
  decompiler:
    image: hextech_ctf_tool-decompiler
    build:
      context: .
      dockerfile: decompiler/Dockerfile
      args:
        GHIDRA_VERSION: ${GHIDRA_VERSION:-12.0.4}
        GHIDRA_BUILD_DATE: ${GHIDRA_BUILD_DATE:-20260303}
    profiles: ["tools"]

  forensic:
    image: hextech_ctf_tool-forensic
    build:
      context: .
      dockerfile: forensic/Dockerfile
    profiles: ["tools"]

  misc:
    image: hextech_ctf_tool-misc
    build:
      context: .
      dockerfile: misc/Dockerfile
    profiles: ["tools"]

  runner:
    image: hextech_ctf_tool-runner
    build:
      context: .
      dockerfile: runner/Dockerfile
    profiles: ["tools"]

  sage:
    image: sagemath/sagemath:latest
    profiles: ["tools-sage"]

volumes:
  redis-data:
